# =============================================================================
# BIOBRUST — Nginx Reverse Proxy Config
# File location on server: /etc/nginx/sites-available/biobrust
#
# Steps:
#   1. sudo cp nginx.conf /etc/nginx/sites-available/biobrust
#   2. sudo ln -s /etc/nginx/sites-available/biobrust /etc/nginx/sites-enabled/
#   3. sudo nginx -t
#   4. sudo systemctl reload nginx
#
# For HTTPS (recommended):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d biobrust.com -d www.biobrust.com
# =============================================================================

# Redirect www → non-www
server {
    listen 80;
    server_name www.biobrust.com;
    return 301 https://biobrust.com$request_uri;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name biobrust.com;
    return 301 https://biobrust.com$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    server_name biobrust.com;

    # SSL — managed by Certbot (auto-filled after running certbot)
    # ssl_certificate /etc/letsencrypt/live/biobrust.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/biobrust.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression — speeds up page load (better SEO)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Static files from Next.js public folder — served directly by Nginx (faster)
    location /_next/static/ {
        alias /var/www/biobrust/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /images/ {
        alias /var/www/biobrust/public/images/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /robots.txt {
        alias /var/www/biobrust/public/robots.txt;
        expires 1d;
        access_log off;
    }

    location /sitemap.xml {
        proxy_pass http://localhost:3000/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location /manifest.json {
        alias /var/www/biobrust/public/manifest.json;
        expires 7d;
        access_log off;
    }

    # Proxy everything else to Next.js app
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
